<!DOCTYPE html>
<html>
<head>
    <title>Image to PDF Converter</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
<h1>Image to PDF Converter</h1>
<form action="/convert"
      method="POST"
      enctype="multipart/form-data">
<input
type="file"
name="images"
multiple
accept="image/*"
required>
<button type="submit">
Convert to PDF
</button>
</form>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
